<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Student Timetable</title>

  <style>
    :root {
      --gold: #d89b2b;
      --gold-light: #efc56d;
      --gold-soft: #f7edd7;
      --gold-border: #e7c987;

      --charcoal: #3b383d;
      --charcoal-soft: #5b5961;

      --page-bg: #f5f3ef;
      --card-bg: #ffffff;
      --border: #e7e2d9;
      --border-soft: #f0ece4;

      --text: #2f2d31;
      --muted: #7d7780;

      --header-row: #4b474e;
      --danger: #b42318;

      --shadow: 0 10px 28px rgba(0, 0, 0, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(180deg, #faf8f4 0%, var(--page-bg) 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding-bottom: 30px;
    }

    /* Banner left alone */
    .hero-banner {
      width: 100%;
      background: #f3f1ed;
      border-bottom: 2px solid var(--gold-border);
    }

    .hero-banner img {
      width: 100%;
      display: block;
      height: auto;
    }

    .container {
      width: min(1180px, calc(100% - 36px));
      margin: 26px auto 0;
    }

    .filter-card,
    .table-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .filter-card {
      padding: 24px 24px 20px;
    }

    .filter-label {
      display: block;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 800;
      color: var(--charcoal);
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      min-height: 58px;
      border: 1px solid #d8d2c8;
      border-radius: 12px;
      padding: 0 52px 0 16px;
      background: #fff;
      color: var(--text);
      font-size: 17px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216, 155, 43, 0.14);
    }

    select:invalid {
      color: var(--muted);
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-52%);
      font-size: 26px;
      color: var(--charcoal);
      pointer-events: none;
      line-height: 1;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .table-card {
      margin-top: 18px;
      overflow: hidden;
      padding: 0;
    }

    .programme-chip-row {
      padding: 24px 24px 14px;
      border-bottom: 1px solid var(--border-soft);
      display: none;
    }

    .programme-chip {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, #fcf7ec 0%, #f7eed8 100%);
      border: 1px solid var(--gold-border);
      color: var(--charcoal);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 800;
      max-width: 100%;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .programme-chip-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--gold) 0%, #c88c22 100%);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex: 0 0 auto;
    }

    .programme-chip-text {
      display: inline-block;
      word-break: break-word;
    }

    .table-inner {
      padding: 18px 24px 24px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .table-wrap::-webkit-scrollbar {
      height: 8px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #eee7da;
      border-radius: 8px;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--gold);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    thead {
      background: var(--header-row);
      color: #fff;
    }

    th,
    td {
      padding: 15px 18px;
      text-align: left;
      vertical-align: middle;
      border-right: 1px solid #ebe5dc;
      border-bottom: 1px solid #ebe5dc;
    }

    th:last-child,
    td:last-child {
      border-right: none;
    }

    th {
      font-size: 16px;
      font-weight: 800;
      white-space: nowrap;
      color: #fff;
      border-right-color: rgba(255,255,255,0.14);
      border-bottom-color: rgba(255,255,255,0.14);
    }

    td {
      background: #fff;
      font-size: 15.5px;
      line-height: 1.4;
      color: var(--text);
    }

    tbody tr:nth-child(even) td {
      background: #fcfaf7;
    }

    .day-cell {
      font-weight: 800;
      color: var(--charcoal);
      white-space: nowrap;
      width: 140px;
    }

    .time-cell {
      white-space: nowrap;
      width: 150px;
    }

    .module-col {
      min-width: 270px;
    }

    .lecturer-col {
      min-width: 210px;
    }

    .empty-state {
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
    }

    .footer {
      width: min(1180px, calc(100% - 36px));
      margin: 12px auto 0;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .container {
        width: calc(100% - 18px);
        margin-top: 14px;
      }

      .filter-card {
        padding: 16px;
        border-radius: 14px;
      }

      .filter-label {
        font-size: 16px;
      }

      select {
        min-height: 50px;
        font-size: 15px;
        border-radius: 10px;
      }

      .table-card {
        border-radius: 14px;
      }

      .programme-chip-row {
        padding: 16px 16px 12px;
      }

      .programme-chip {
        width: 100%;
        border-radius: 14px;
        font-size: 15px;
        padding: 10px 14px;
      }

      .programme-chip-icon {
        width: 30px;
        height: 30px;
        font-size: 15px;
      }

      .table-inner {
        padding: 12px 12px 16px;
      }

      table {
        min-width: 720px;
      }

      th,
      td {
        padding: 12px 14px;
      }

      th {
        font-size: 14px;
      }

      td {
        font-size: 14px;
      }

      .footer {
        width: calc(100% - 18px);
        text-align: center;
      }
    }

    @media (max-width: 430px) {
      table {
        min-width: 700px;
      }

      .day-cell {
        width: 120px;
      }

      .time-cell {
        width: 120px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- Banner kept alone -->
    <section class="hero-banner">
      <img src="banner.png" alt="Student Timetable Banner">
    </section>

    <section class="container">
      <div class="filter-card">
        <label class="filter-label" for="programmeSelect">Programme</label>

        <div class="select-wrap">
          <select id="programmeSelect" required>
            <option value="" selected disabled>Select programme here</option>
          </select>
        </div>

        <div id="status" class="status">Loading timetable...</div>
      </div>

      <div class="table-card">
        <div id="programmeChipRow" class="programme-chip-row">
          <div class="programme-chip">
            <span class="programme-chip-icon">🎓</span>
            <span id="selectedProgrammeName" class="programme-chip-text"></span>
          </div>
        </div>

        <div class="table-inner">
          <div class="table-wrap">
            <table id="timetableTable" style="display:none;">
              <thead>
                <tr>
                  <th>Day</th>
                  <th>Time</th>
                  <th class="module-col">Module Name</th>
                  <th class="lecturer-col">Lecturer</th>
                </tr>
              </thead>
              <tbody id="timetableBody"></tbody>
            </table>
          </div>

          <div id="emptyState" class="empty-state">
            Please select a programme to view the timetable.
          </div>
        </div>
      </div>
    </section>

    <div id="footerNote" class="footer"></div>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyVymT7zUusgkD56br4WWvXCLFTPnBLIF1WenQXAN_xXSjBBNwkzwoZiZjMxTB9MZpLUg/exec';

    const programmeSelect = document.getElementById('programmeSelect');
    const statusEl = document.getElementById('status');
    const tableEl = document.getElementById('timetableTable');
    const tbodyEl = document.getElementById('timetableBody');
    const emptyStateEl = document.getElementById('emptyState');
    const programmeChipRowEl = document.getElementById('programmeChipRow');
    const selectedProgrammeNameEl = document.getElementById('selectedProgrammeName');
    const footerNoteEl = document.getElementById('footerNote');

    let timetableRows = [];

    function loadTimetable() {
      const cached = getCachedData();

      if (cached) {
        handleTimetablePayload(cached.payload, true);
        return;
      }

      const callbackName = 'handleTimetableJsonp_' + Date.now();

      window[callbackName] = function(payload) {
        cleanupJsonp(callbackName);
        setCachedData(payload);
        handleTimetablePayload(payload, false);
      };

      const script = document.createElement('script');
      script.src = `${API_URL}?callback=${callbackName}&v=${Date.now()}`;

      script.onerror = function() {
        cleanupJsonp(callbackName);
        showError('Unable to load timetable. Please check the Apps Script Web App URL and deployment access.');
      };

      document.body.appendChild(script);
    }

    function cleanupJsonp(callbackName) {
      const scripts = Array.from(document.querySelectorAll('script'));

      scripts.forEach(script => {
        if (script.src.includes(callbackName)) {
          script.remove();
        }
      });

      try {
        delete window[callbackName];
      } catch {
        window[callbackName] = undefined;
      }
    }

    function handleTimetablePayload(payload, fromCache) {
      if (!payload || !payload.success || !Array.isArray(payload.data)) {
        showError('Invalid timetable data received.');
        return;
      }

      timetableRows = payload.data;

      if (timetableRows.length === 0) {
        statusEl.textContent = 'No timetable data found.';
        return;
      }

      setupProgrammeDropdown(timetableRows);

      statusEl.classList.remove('error');
      statusEl.textContent = fromCache
        ? 'Timetable loaded from local cache.'
        : 'Timetable loaded.';

      footerNoteEl.textContent = payload.updatedAt
        ? `Last refreshed: ${formatDate(payload.updatedAt)}`
        : '';
    }

    function setupProgrammeDropdown(rows) {
      programmeSelect.innerHTML = '<option value="" selected disabled>Select programme here</option>';

      const programmes = Array.from(
        new Map(
          rows.map(row => [
            row.programmeCode,
            {
              code: row.programmeCode,
              name: row.programmeName
            }
          ])
        ).values()
      ).filter(programme => programme.code && programme.name);

      programmes.sort((a, b) => a.name.localeCompare(b.name));

      programmes.forEach(programme => {
        const option = document.createElement('option');
        option.value = programme.code;
        option.textContent = programme.name;
        programmeSelect.appendChild(option);
      });
    }

    programmeSelect.addEventListener('change', function() {
      const selectedCode = programmeSelect.value;

      const rows = timetableRows
        .filter(row => row.programmeCode === selectedCode)
        .sort((a, b) => {
          if (a.daySort !== b.daySort) {
            return a.daySort - b.daySort;
          }

          return String(a.time).localeCompare(String(b.time));
        });

      renderTable(rows);
    });

    function renderTable(rows) {
      tbodyEl.innerHTML = '';

      if (rows.length === 0) {
        tableEl.style.display = 'none';
        programmeChipRowEl.style.display = 'none';
        emptyStateEl.style.display = 'block';
        emptyStateEl.textContent = 'No timetable found for the selected programme.';
        return;
      }

      selectedProgrammeNameEl.textContent = rows[0].programmeName;
      programmeChipRowEl.style.display = 'block';
      tableEl.style.display = 'table';
      emptyStateEl.style.display = 'none';

      rows.forEach(row => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td class="day-cell">${escapeHtml(row.day)}</td>
          <td class="time-cell">${escapeHtml(row.time)}</td>
          <td class="module-col">${escapeHtml(row.moduleName)}</td>
          <td class="lecturer-col">${escapeHtml(row.lecturer)}</td>
        `;

        tbodyEl.appendChild(tr);
      });
    }

    function showError(message) {
      statusEl.classList.add('error');
      statusEl.textContent = message;
      tableEl.style.display = 'none';
      programmeChipRowEl.style.display = 'none';
      emptyStateEl.style.display = 'block';
      emptyStateEl.textContent = 'Timetable could not be loaded.';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setCachedData(payload) {
      try {
        localStorage.setItem('studentTimetableCache', JSON.stringify({
          cachedAt: new Date().toISOString(),
          payload
        }));
      } catch {
      }
    }

    function getCachedData() {
      try {
        const raw = localStorage.getItem('studentTimetableCache');
        if (!raw) return null;

        const cached = JSON.parse(raw);
        const cachedAt = new Date(cached.cachedAt).getTime();
        const ageMs = Date.now() - cachedAt;
        const maxAgeMs = 5 * 60 * 1000;

        return ageMs <= maxAgeMs ? cached : null;
      } catch {
        return null;
      }
    }

    function formatDate(value) {
      const date = new Date(value);

      return date.toLocaleString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    loadTimetable();
  </script>
</body>
</html>
