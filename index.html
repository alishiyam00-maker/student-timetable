<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Timetable</title>

  <style>
    :root {
      --gold: #d89b2b;
      --gold-dark: #b57a15;
      --gold-soft: #f6ead1;

      --charcoal: #3f3c43;
      --charcoal-dark: #2f2c31;
      --charcoal-soft: #5e5961;

      --text: #2f2d31;
      --muted: #7d7780;

      --page-bg: #f6f4ef;
      --card-bg: #ffffff;
      --line: #e4ddd2;
      --line-soft: #efeae1;

      --danger: #b42318;

      --shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #faf8f4 0%, var(--page-bg) 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* Banner */
    .hero-banner {
      width: 100%;
      background: #f2efea;
      border-bottom: 1px solid #ddd6ca;
    }

    .hero-banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Accent strip below banner */
    .accent-strip {
      position: relative;
      height: 18px;
      background: transparent;
      overflow: hidden;
    }

    .accent-strip::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: calc(100% - 210px);
      height: 2px;
      background: var(--gold);
    }

    .accent-strip::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 210px;
      height: 100%;
      background:
        linear-gradient(135deg, transparent 0 27%, var(--gold) 27% 36%, var(--charcoal) 36% 46%, #ffffff 46% 51%, transparent 51%),
        transparent;
    }

    .container {
      width: min(1180px, calc(100% - 36px));
      margin: 26px auto 0;
      position: relative;
    }

    /* Light architectural line feeling */
    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to right, rgba(0,0,0,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.015) 1px, transparent 1px);
      background-size: 120px 120px, 120px 120px;
      opacity: 0.35;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    /* Generic angular panel */
    .panel {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 160px;
      height: 4px;
      background: var(--gold);
      z-index: 1;
    }

    .panel::after {
      content: "";
      position: absolute;
      top: 0;
      left: 160px;
      width: 42px;
      height: 4px;
      background: var(--charcoal);
      transform: skewX(-38deg);
      transform-origin: left;
      z-index: 1;
    }

    .panel-inner {
      padding: 22px;
    }

    /* Filter panel */
    .filter-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .filter-head-mark {
      width: 28px;
      height: 28px;
      background: var(--gold);
      clip-path: polygon(0 0, 78% 0, 100% 50%, 78% 100%, 0 100%, 12% 50%);
    }

    .filter-head-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.4px;
      color: var(--charcoal);
      text-transform: uppercase;
    }

    .filter-rule {
      height: 1px;
      background: linear-gradient(90deg, var(--gold) 0, var(--gold) 130px, #ddd5c9 130px, #ddd5c9 100%);
      margin-bottom: 18px;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      min-height: 56px;
      padding: 0 54px 0 16px;
      border: 1px solid #d4cdc1;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216, 155, 43, 0.14);
    }

    select:invalid {
      color: var(--muted);
    }

    .select-wrap::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 58px;
      height: 100%;
      background: linear-gradient(180deg, #fbfaf8 0%, #f1ece3 100%);
      border-left: 1px solid #ddd6ca;
      pointer-events: none;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 19px;
      top: 50%;
      transform: translateY(-52%);
      font-size: 26px;
      color: var(--charcoal);
      pointer-events: none;
      line-height: 1;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    /* Results panel */
    .results-topbar {
      display: none;
      align-items: stretch;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, #ffffff 0%, #faf8f4 100%);
    }

    .results-tag {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 0 28px 0 20px;
      background: linear-gradient(180deg, var(--gold-soft) 0%, #f4e4bf 100%);
      color: var(--charcoal-dark);
      font-weight: 800;
      font-size: 18px;
      max-width: 100%;
      border-right: 1px solid #e2cf9f;
      clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 50%, calc(100% - 22px) 100%, 0 100%);
    }

    .results-tag-icon {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--gold);
      color: #fff;
      font-size: 16px;
      clip-path: polygon(0 0, 78% 0, 100% 50%, 78% 100%, 0 100%, 12% 50%);
      flex: 0 0 auto;
    }

    .results-body {
      padding: 18px 22px 22px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-label-left {
      display: flex;
      gap: 4px;
    }

    .section-label-left span {
      display: block;
      width: 18px;
      height: 16px;
      border: 2px solid var(--gold);
      border-right: none;
      transform: skewX(-38deg);
    }

    .section-label-text {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--charcoal);
      text-transform: uppercase;
    }

    .section-label-rule {
      flex: 1;
      height: 1px;
      background: #ded7cb;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
      background: #fff;
    }

    .table-wrap::-webkit-scrollbar {
      height: 8px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #eee7da;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--gold);
    }

    table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
    }

    thead tr {
      background: linear-gradient(90deg, var(--charcoal-dark), var(--charcoal));
      color: #fff;
    }

    th,
    td {
      padding: 15px 18px;
      text-align: left;
      vertical-align: middle;
      border-bottom: 1px solid #ece6dc;
      border-right: 1px solid #ece6dc;
    }

    th:last-child,
    td:last-child {
      border-right: none;
    }

    th {
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      letter-spacing: 0.3px;
      position: relative;
    }

    th::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 10px;
      background: var(--gold);
      clip-path: polygon(0 0, 78% 0, 100% 50%, 78% 100%, 0 100%, 12% 50%);
      vertical-align: middle;
    }

    td {
      background: #fff;
      font-size: 15px;
      line-height: 1.45;
    }

    tbody tr:nth-child(even) td {
      background: #fcfaf6;
    }

    tbody tr:hover td {
      background: #fffaf0;
    }

    .day-cell {
      width: 140px;
      white-space: nowrap;
      font-weight: 800;
      color: var(--charcoal);
    }

    .time-cell {
      width: 145px;
      white-space: nowrap;
    }

    .module-col {
      min-width: 290px;
    }

    .lecturer-col {
      min-width: 220px;
    }

    .empty-state {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      background: #fff;
      border: 1px dashed #dbd2c2;
    }

    .footer {
      width: min(1180px, calc(100% - 36px));
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 820px) {
      .container {
        width: calc(100% - 18px);
        margin-top: 14px;
      }

      .panel-inner {
        padding: 16px;
      }

      .results-body {
        padding: 14px;
      }

      .results-topbar {
        min-height: 58px;
      }

      .results-tag {
        width: 100%;
        min-height: 56px;
        font-size: 15px;
        padding: 0 18px 0 14px;
        clip-path: none;
      }

      .results-tag-icon {
        width: 30px;
        height: 30px;
        font-size: 14px;
      }

      .filter-head-title {
        font-size: 16px;
      }

      select {
        min-height: 50px;
        font-size: 15px;
      }

      table {
        min-width: 730px;
      }

      th,
      td {
        padding: 12px 14px;
      }

      th {
        font-size: 14px;
      }

      td {
        font-size: 14px;
      }

      .footer {
        width: calc(100% - 18px);
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .accent-strip::before {
        width: calc(100% - 110px);
      }

      .accent-strip::after {
        width: 110px;
      }

      .section-label-left span {
        width: 14px;
        height: 12px;
      }

      table {
        min-width: 700px;
      }

      .day-cell {
        width: 120px;
      }

      .time-cell {
        width: 120px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero-banner">
      <img src="banner.png" alt="Student Timetable Banner">
    </section>

    <div class="accent-strip"></div>

    <section class="container">
      <div class="content">

        <!-- Filter -->
        <div class="panel">
          <div class="panel-inner">
            <div class="filter-head">
              <div class="filter-head-mark"></div>
              <div class="filter-head-title">Programme Selection</div>
            </div>

            <div class="filter-rule"></div>

            <div class="select-wrap">
              <select id="programmeSelect" required>
                <option value="" selected disabled>Select programme here</option>
              </select>
            </div>

            <div id="status" class="status">Loading timetable...</div>
          </div>
        </div>

        <!-- Results -->
        <div class="panel">
          <div id="resultsTopbar" class="results-topbar">
            <div class="results-tag">
              <span class="results-tag-icon">🎓</span>
              <span id="selectedProgrammeName"></span>
            </div>
          </div>

          <div class="results-body">
            <div class="section-label">
              <div class="section-label-left">
                <span></span><span></span><span></span>
              </div>
              <div class="section-label-text">Weekly Schedule</div>
              <div class="section-label-rule"></div>
            </div>

            <div class="table-wrap">
              <table id="timetableTable" style="display:none;">
                <thead>
                  <tr>
                    <th>Day</th>
                    <th>Time</th>
                    <th class="module-col">Module Name</th>
                    <th class="lecturer-col">Lecturer</th>
                  </tr>
                </thead>
                <tbody id="timetableBody"></tbody>
              </table>
            </div>

            <div id="emptyState" class="empty-state">
              Please select a programme to view the timetable.
            </div>
          </div>
        </div>

      </div>
    </section>

    <div id="footerNote" class="footer"></div>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyVymT7zUusgkD56br4WWvXCLFTPnBLIF1WenQXAN_xXSjBBNwkzwoZiZjMxTB9MZpLUg/exec';

    const programmeSelect = document.getElementById('programmeSelect');
    const statusEl = document.getElementById('status');
    const tableEl = document.getElementById('timetableTable');
    const tbodyEl = document.getElementById('timetableBody');
    const emptyStateEl = document.getElementById('emptyState');
    const resultsTopbarEl = document.getElementById('resultsTopbar');
    const selectedProgrammeNameEl = document.getElementById('selectedProgrammeName');
    const footerNoteEl = document.getElementById('footerNote');

    let timetableRows = [];

    function loadTimetable() {
      const cached = getCachedData();

      if (cached) {
        handleTimetablePayload(cached.payload, true);
        return;
      }

      const callbackName = 'handleTimetableJsonp_' + Date.now();

      window[callbackName] = function(payload) {
        cleanupJsonp(callbackName);
        setCachedData(payload);
        handleTimetablePayload(payload, false);
      };

      const script = document.createElement('script');
      script.src = `${API_URL}?callback=${callbackName}&v=${Date.now()}`;

      script.onerror = function() {
        cleanupJsonp(callbackName);
        showError('Unable to load timetable. Please check the Apps Script Web App URL and deployment access.');
      };

      document.body.appendChild(script);
    }

    function cleanupJsonp(callbackName) {
      const scripts = Array.from(document.querySelectorAll('script'));

      scripts.forEach(script => {
        if (script.src.includes(callbackName)) {
          script.remove();
        }
      });

      try {
        delete window[callbackName];
      } catch {
        window[callbackName] = undefined;
      }
    }

    function handleTimetablePayload(payload, fromCache) {
      if (!payload || !payload.success || !Array.isArray(payload.data)) {
        showError('Invalid timetable data received.');
        return;
      }

      timetableRows = payload.data;

      if (timetableRows.length === 0) {
        statusEl.textContent = 'No timetable data found.';
        return;
      }

      setupProgrammeDropdown(timetableRows);

      statusEl.classList.remove('error');
      /*statusEl.textContent = fromCache
        ? 'Timetable loaded from local cache.'
        : 'Timetable loaded.';*/

      footerNoteEl.textContent = payload.updatedAt
        ? `Last refreshed: ${formatDate(payload.updatedAt)}`
        : '';
    }

    function setupProgrammeDropdown(rows) {
      programmeSelect.innerHTML = '<option value="" selected disabled>Select programme here</option>';

      const programmes = Array.from(
        new Map(
          rows.map(row => [
            row.programmeCode,
            {
              code: row.programmeCode,
              name: row.programmeName
            }
          ])
        ).values()
      ).filter(programme => programme.code && programme.name);

      programmes.sort((a, b) => a.name.localeCompare(b.name));

      programmes.forEach(programme => {
        const option = document.createElement('option');
        option.value = programme.code;
        option.textContent = programme.name;
        programmeSelect.appendChild(option);
      });
    }

    programmeSelect.addEventListener('change', function() {
      const selectedCode = programmeSelect.value;

      const rows = timetableRows
        .filter(row => row.programmeCode === selectedCode)
        .sort((a, b) => {
          if (a.daySort !== b.daySort) {
            return a.daySort - b.daySort;
          }

          return String(a.time).localeCompare(String(b.time));
        });

      renderTable(rows);
    });

    function renderTable(rows) {
      tbodyEl.innerHTML = '';

      if (rows.length === 0) {
        tableEl.style.display = 'none';
        resultsTopbarEl.style.display = 'none';
        emptyStateEl.style.display = 'block';
        emptyStateEl.textContent = 'No timetable found for the selected programme.';
        return;
      }

      selectedProgrammeNameEl.textContent = rows[0].programmeName;
      resultsTopbarEl.style.display = 'flex';
      tableEl.style.display = 'table';
      emptyStateEl.style.display = 'none';

      rows.forEach(row => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td class="day-cell">${escapeHtml(row.day)}</td>
          <td class="time-cell">${escapeHtml(row.time)}</td>
          <td class="module-col">${escapeHtml(row.moduleName)}</td>
          <td class="lecturer-col">${escapeHtml(row.lecturer)}</td>
        `;

        tbodyEl.appendChild(tr);
      });
    }

    function showError(message) {
      statusEl.classList.add('error');
      statusEl.textContent = message;
      tableEl.style.display = 'none';
      resultsTopbarEl.style.display = 'none';
      emptyStateEl.style.display = 'block';
      emptyStateEl.textContent = 'Timetable could not be loaded.';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setCachedData(payload) {
      try {
        localStorage.setItem('studentTimetableCache', JSON.stringify({
          cachedAt: new Date().toISOString(),
          payload
        }));
      } catch {
      }
    }

    function getCachedData() {
      try {
        const raw = localStorage.getItem('studentTimetableCache');
        if (!raw) return null;

        const cached = JSON.parse(raw);
        const cachedAt = new Date(cached.cachedAt).getTime();
        const ageMs = Date.now() - cachedAt;
        const maxAgeMs = 5 * 60 * 1000;

        return ageMs <= maxAgeMs ? cached : null;
      } catch {
        return null;
      }
    }

    function formatDate(value) {
      const date = new Date(value);

      return date.toLocaleString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    loadTimetable();
  </script>
</body>
</html>
