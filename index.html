<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Student Timetable</title>

  <style>
    :root {
      --gold: #d89b2b;
      --gold-light: #f4bd55;
      --gold-dark: #a96f12;
      --charcoal: #252a2d;
      --charcoal-soft: #343a3d;
      --text: #20242a;
      --muted: #6b7280;
      --border: #e3e5e8;
      --bg: #f6f6f4;
      --white: #ffffff;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(216, 155, 43, 0.08), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding-bottom: 28px;
    }

    .header {
      position: relative;
      min-height: 150px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78)),
        url("banner.png");
      background-size: cover;
      background-position: center;
      border-bottom: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 22px 16px;
    }

    .header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 220px;
      height: 8px;
      background: var(--charcoal);
    }

    .header::after {
      content: "";
      position: absolute;
      top: 0;
      left: 200px;
      width: 42px;
      height: 8px;
      background: var(--gold);
      transform: skewX(-35deg);
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .college-mark {
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--gold-dark);
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 900;
      color: var(--charcoal);
      letter-spacing: -1px;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--gold-dark);
      font-size: clamp(15px, 2vw, 22px);
      font-weight: 700;
    }

    .container {
      width: min(1120px, calc(100% - 28px));
      margin: 22px auto 0;
    }

    .filter-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-top: 4px solid var(--gold);
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .filter-label {
      display: block;
      margin-bottom: 9px;
      color: var(--charcoal);
      font-size: 18px;
      font-weight: 800;
    }

    select {
      width: 100%;
      min-height: 52px;
      padding: 0 14px;
      border: 1px solid #bfc5cc;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216, 155, 43, 0.18);
    }

    select:invalid {
      color: var(--muted);
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .table-card {
      margin-top: 20px;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .programme-bar {
      display: none;
      align-items: center;
      gap: 12px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      color: var(--charcoal);
      padding: 17px 22px;
      font-size: 20px;
      font-weight: 900;
    }

    .programme-icon {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--charcoal);
      color: var(--gold-light);
      font-size: 18px;
      flex: 0 0 auto;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-wrap::-webkit-scrollbar {
      height: 8px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--gold);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    thead {
      background: var(--charcoal);
      color: #fff;
    }

    th,
    td {
      padding: 15px 17px;
      text-align: left;
      border: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      border-color: rgba(255,255,255,0.14);
      font-size: 16px;
      font-weight: 900;
      white-space: nowrap;
    }

    td {
      font-size: 15.5px;
      line-height: 1.4;
      background: #fff;
    }

    tbody tr:nth-child(even) td {
      background: #fbfbfb;
    }

    .day-cell {
      font-weight: 800;
      color: var(--charcoal);
      white-space: nowrap;
    }

    .time-cell {
      white-space: nowrap;
    }

    .empty-state {
      padding: 38px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .footer {
      width: min(1120px, calc(100% - 28px));
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 720px) {
      .header {
        min-height: 125px;
        padding: 18px 12px;
      }

      .header::before {
        width: 150px;
        height: 6px;
      }

      .header::after {
        left: 135px;
        width: 34px;
        height: 6px;
      }

      .college-mark {
        font-size: 11px;
        letter-spacing: 3px;
      }

      h1 {
        font-size: clamp(28px, 9vw, 42px);
      }

      .subtitle {
        font-size: 14px;
      }

      .container {
        width: calc(100% - 18px);
        margin-top: 14px;
      }

      .filter-card {
        padding: 14px;
      }

      .filter-label {
        font-size: 16px;
      }

      select {
        min-height: 48px;
        font-size: 15px;
      }

      .programme-bar {
        padding: 14px;
        font-size: 16px;
        align-items: flex-start;
      }

      .programme-icon {
        width: 28px;
        height: 28px;
        font-size: 15px;
      }

      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        width: 100%;
        min-width: 760px;
        display: table;
      }

      thead {
        display: table-header-group;
      }

      tbody {
        display: table-row-group;
      }

      tr {
        display: table-row;
      }

      th,
      td {
        display: table-cell;
        white-space: normal;
      }

      th {
        font-size: 14px;
        padding: 12px 14px;
        white-space: nowrap;
      }

      td {
        font-size: 14px;
        padding: 12px 14px;
      }

      .day-cell,
      .time-cell {
        white-space: nowrap;
      }

      td::before {
        content: none;
      }

      .empty-state {
        font-size: 15px;
        padding: 30px 14px;
      }

      .footer {
        text-align: center;
      }
    }

    @media (max-width: 430px) {
      table {
        min-width: 700px;
      }

      th,
      td {
        padding: 11px 12px;
      }

      .module-col {
        min-width: 230px;
      }

      .lecturer-col {
        min-width: 170px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="header-content">
        <div class="college-mark">Avid College</div>
        <h1>Student Timetable</h1>
        <div id="intakeTitle" class="subtitle">Semester 1 • January Intake 2026</div>
      </div>
    </header>

    <section class="container">
      <div class="filter-card">
        <label class="filter-label" for="programmeSelect">Programme</label>

        <select id="programmeSelect" required>
          <option value="" selected disabled>Select programme here</option>
        </select>

        <div id="status" class="status">Loading timetable...</div>
      </div>

      <div class="table-card">
        <div id="programmeBar" class="programme-bar">
          <span class="programme-icon">🎓</span>
          <span id="selectedProgrammeName"></span>
        </div>

        <div class="table-wrap">
          <table id="timetableTable" style="display:none;">
            <thead>
              <tr>
                <th>Day</th>
                <th>Time</th>
                <th class="module-col">Module Name</th>
                <th class="lecturer-col">Lecturer</th>
              </tr>
            </thead>
            <tbody id="timetableBody"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state">
          Please select a programme to view the timetable.
        </div>
      </div>
    </section>

    <div id="footerNote" class="footer"></div>
  </main>

  <script>
    /*
      Replace this with your deployed Apps Script Web App URL.

      Example:
      const API_URL = 'https://script.google.com/macros/s/AKfycbxxxxxxxxxxxxxxxx/exec';
    */
    const API_URL = 'https://script.google.com/macros/s/AKfycbyVymT7zUusgkD56br4WWvXCLFTPnBLIF1WenQXAN_xXSjBBNwkzwoZiZjMxTB9MZpLUg/exec';

    const programmeSelect = document.getElementById('programmeSelect');
    const statusEl = document.getElementById('status');
    const tableEl = document.getElementById('timetableTable');
    const tbodyEl = document.getElementById('timetableBody');
    const emptyStateEl = document.getElementById('emptyState');
    const programmeBarEl = document.getElementById('programmeBar');
    const selectedProgrammeNameEl = document.getElementById('selectedProgrammeName');
    const footerNoteEl = document.getElementById('footerNote');
    const intakeTitleEl = document.getElementById('intakeTitle');

    let timetableRows = [];

    function loadTimetable() {
      const cached = getCachedData();

      if (cached) {
        handleTimetablePayload(cached.payload, true);
        return;
      }

      const callbackName = 'handleTimetableJsonp_' + Date.now();

      window[callbackName] = function(payload) {
        cleanupJsonp(callbackName);
        setCachedData(payload);
        handleTimetablePayload(payload, false);
      };

      const script = document.createElement('script');
      script.src = `${API_URL}?callback=${callbackName}&v=${Date.now()}`;

      script.onerror = function() {
        cleanupJsonp(callbackName);
        showError('Unable to load timetable. Please check the Apps Script Web App URL and deployment access.');
      };

      document.body.appendChild(script);
    }

    function cleanupJsonp(callbackName) {
      const scripts = Array.from(document.querySelectorAll('script'));

      scripts.forEach(script => {
        if (script.src.includes(callbackName)) {
          script.remove();
        }
      });

      try {
        delete window[callbackName];
      } catch {
        window[callbackName] = undefined;
      }
    }

    function handleTimetablePayload(payload, fromCache) {
      if (!payload || !payload.success || !Array.isArray(payload.data)) {
        showError('Invalid timetable data received.');
        return;
      }

      timetableRows = payload.data;

      if (timetableRows.length === 0) {
        statusEl.textContent = 'No timetable data found.';
        return;
      }

      const firstIntake = timetableRows.find(row => row.intake)?.intake;

      if (firstIntake) {
        intakeTitleEl.textContent = firstIntake;
      }

      setupProgrammeDropdown(timetableRows);

      statusEl.classList.remove('error');
      statusEl.textContent = fromCache
        ? 'Timetable loaded from local cache.'
        : 'Timetable loaded.';

      footerNoteEl.textContent = payload.updatedAt
        ? `Last refreshed: ${formatDate(payload.updatedAt)}`
        : '';
    }

    function setupProgrammeDropdown(rows) {
      programmeSelect.innerHTML = '<option value="" selected disabled>Select programme here</option>';

      const programmes = Array.from(
        new Map(
          rows.map(row => [
            row.programmeCode,
            {
              code: row.programmeCode,
              name: row.programmeName,
              faculty: row.faculty
            }
          ])
        ).values()
      ).filter(programme => programme.code && programme.name);

      programmes.sort((a, b) => a.name.localeCompare(b.name));

      programmes.forEach(programme => {
        const option = document.createElement('option');
        option.value = programme.code;
        option.textContent = programme.name;
        programmeSelect.appendChild(option);
      });
    }

    programmeSelect.addEventListener('change', function() {
      const selectedCode = programmeSelect.value;

      const rows = timetableRows
        .filter(row => row.programmeCode === selectedCode)
        .sort((a, b) => {
          if (a.daySort !== b.daySort) {
            return a.daySort - b.daySort;
          }

          return String(a.time).localeCompare(String(b.time));
        });

      renderTable(rows);
    });

    function renderTable(rows) {
      tbodyEl.innerHTML = '';

      if (rows.length === 0) {
        tableEl.style.display = 'none';
        programmeBarEl.style.display = 'none';
        emptyStateEl.style.display = 'block';
        emptyStateEl.textContent = 'No timetable found for the selected programme.';
        return;
      }

      selectedProgrammeNameEl.textContent = rows[0].programmeName;
      programmeBarEl.style.display = 'flex';
      tableEl.style.display = 'table';
      emptyStateEl.style.display = 'none';

      rows.forEach(row => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td class="day-cell" data-label="Day">${escapeHtml(row.day)}</td>
          <td class="time-cell" data-label="Time">${escapeHtml(row.time)}</td>
          <td class="module-col" data-label="Module Name">${escapeHtml(row.moduleName)}</td>
          <td class="lecturer-col" data-label="Lecturer">${escapeHtml(row.lecturer)}</td>
        `;

        tbodyEl.appendChild(tr);
      });
    }

    function showError(message) {
      statusEl.classList.add('error');
      statusEl.textContent = message;

      tableEl.style.display = 'none';
      programmeBarEl.style.display = 'none';
      emptyStateEl.style.display = 'block';
      emptyStateEl.textContent = 'Timetable could not be loaded.';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setCachedData(payload) {
      try {
        localStorage.setItem('studentTimetableCache', JSON.stringify({
          cachedAt: new Date().toISOString(),
          payload
        }));
      } catch {
        // Ignore local cache errors.
      }
    }

    function getCachedData() {
      try {
        const raw = localStorage.getItem('studentTimetableCache');

        if (!raw) return null;

        const cached = JSON.parse(raw);
        const cachedAt = new Date(cached.cachedAt).getTime();
        const ageMs = Date.now() - cachedAt;
        const maxAgeMs = 5 * 60 * 1000;

        return ageMs <= maxAgeMs ? cached : null;
      } catch {
        return null;
      }
    }

    function formatDate(value) {
      const date = new Date(value);

      return date.toLocaleString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    loadTimetable();
  </script>
</body>
</html>
